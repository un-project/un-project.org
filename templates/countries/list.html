{% extends "base.html" %}
{% block title %}Countries{% endblock %}

{% block content %}
<h1>Countries</h1>
<div style="display:flex; flex-wrap:wrap; gap:0.6rem 0.8rem; margin-top:1.25rem;">
  {% for country in countries %}
  <a href="{{ country.get_absolute_url }}"
     style="display:flex; align-items:center; gap:0.45rem; padding:0.35rem 0.7rem;
            background:var(--un-light); border:1px solid var(--border); border-radius:5px;
            font-size:0.88rem; color:inherit; text-decoration:none; white-space:nowrap;"
     title="{{ country.name }}">
    {% if country.flag_url %}
    <img src="{{ country.flag_url }}" alt="" style="height:14px; width:22px; object-fit:cover; border-radius:1px; border:1px solid #ddd; flex-shrink:0;">
    {% endif %}
    {{ country.display_name }}
  </a>
  {% endfor %}
</div>
{% endblock %}
