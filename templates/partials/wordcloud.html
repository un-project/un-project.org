<div class="wc-widget" data-url="{{ wc_url }}"
     style="margin:1.5rem 0; background:var(--un-light); border:1px solid var(--border); border-radius:6px; padding:0.9rem 1.1rem 0.8rem;">
  <div style="font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:0.6rem;">
    {% if wc_title %}{{ wc_title }}{% else %}Keywords{% endif %}
  </div>
  <svg></svg>
  <p class="wc-loading" style="font-size:0.82rem; color:var(--muted); text-align:center; margin:0.5rem 0 0;">Loading…</p>
</div>
