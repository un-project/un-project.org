services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-unproject}
      POSTGRES_USER: ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myuser} -d ${DB_NAME:-unproject}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py refresh_search_index --full &&
             python manage.py collectstatic --noinput &&
             gunicorn un_site.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git/
            - .venv/
            - __pycache__/
            - "*.pyc"
            - staticfiles/
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: Dockerfile

  cron:
    build: .
    restart: unless-stopped
    user: root
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    # Export Docker env vars to /etc/environment so cron jobs inherit them,
    # then install the crontab and start the daemon in the foreground.
    command: >
      sh -c "printenv | grep -E '^(DB_|DJANGO_)' >> /etc/environment &&
             crontab /app/docker/crontab &&
             cron -f"

volumes:
  postgres_data:
